<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CODERUDRA-X | Cinematic Tactical Map</title>
  
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  
  <style>
    body { margin: 0; background: #060a04; overflow: hidden; }
    #map { width: 100vw; height: 100vh; background: #060a04; cursor: crosshair; }
    
    /* ── CUSTOM RADAR MARKER (To pop on busy background) ── */
    .radar-marker {
      width: 16px;
      height: 16px;
      background-color: #00ff88;
      border-radius: 50%;
      box-shadow: 0 0 10px #00ff88, 0 0 20px #00ff88;
      position: relative;
    }
    .radar-marker::after {
      content: '';
      position: absolute;
      top: 50%; left: 50%;
      width: 100%; height: 100%;
      background: transparent;
      border: 2px solid #00ff88;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      animation: radar-pulse 1.5s infinite ease-out;
    }
    
    @keyframes radar-pulse {
      0%   { width: 100%; height: 100%; opacity: 1; }
      100% { width: 300%; height: 300%; opacity: 0; }
    }

    /* ── MILITARY POPUP STYLE ── */
    .leaflet-popup-content-wrapper {
      background: rgba(10, 15, 10, 0.95);
      border: 1px solid #00ff88;
      color: #c8a96e;
      font-family: 'Share Tech Mono', monospace;
      border-radius: 0;
      box-shadow: 0 0 15px rgba(0, 255, 136, 0.2);
    }
    .leaflet-popup-tip { background: rgba(10, 15, 10, 0.95); border: 1px solid #00ff88; }
    .leaflet-container a.leaflet-popup-close-button { color: #00ff88; }
  </style>
</head>
<body>

  <div id="map"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  
  <script>
    // 1. Initialize Map with Simple CRS (Flat Image Mode)
    const map = L.map('map', {
      crs: L.CRS.Simple,
      minZoom: -2,
      maxZoom: 2,
      zoomControl: false // Hide default zoom for cleaner UI
    });

    // Add custom zoom control to bottom right
    L.control.zoom({ position: 'bottomright' }).addTo(map);

    // 2. Define Image Bounds (16:9 Ratio - 1920x1080)
    // Format: [[Bottom-Left Y, X], [Top-Right Y, X]]
    const bounds = [[0, 0], [1080, 1920]];
    
    // REPLACE THIS with your actual Map 1 file name
    const image = L.imageOverlay('cinematic-map.png', bounds).addTo(map);
    map.fitBounds(bounds);

    // 3. Create Custom Glowing Icon
    const glowingIcon = L.divIcon({
      className: 'custom-icon',
      html: '<div class="radar-marker"></div>',
      iconSize: [16, 16],
      iconAnchor: [8, 8] // Centers the icon
    });

    // 4. Example Markers (You will need to update these coordinates)
    
    // The Main Center Citadel
    const centerCitadel = L.marker([540, 960], { icon: glowingIcon }).addTo(map);
    centerCitadel.bindPopup("<strong style='color:#00ff88'>THE CITADEL</strong><br>Executive Command");

    // A Base on the Top Left
    const baseAlpha = L.marker([850, 250], { icon: glowingIcon }).addTo(map);
    baseAlpha.bindPopup("<strong style='color:#f0a500'>INDRA-AI</strong><br>Vision Node");

    // 5. COORDINATE FINDER TOOL (Crucial Step)
    // Click anywhere on the map to get exact coordinates for your bases
    map.on('click', function(e) {
      const y = Math.round(e.latlng.lat);
      const x = Math.round(e.latlng.lng);
      
      // Shows an alert and logs to console so you can copy it
      const coordText = `[${y}, ${x}]`;
      console.log("Coordinate for code: " + coordText);
      
      // Temporary popup to show you where you clicked
      L.popup()
        .setLatLng(e.latlng)
        .setContent("Coords: " + coordText)
        .openOn(map);
    });
  </script>
</body>
</html>
